<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 전투기 시뮬레이터 - ULTIMATE TACTICAL EDITION</title>
    <style>
        /* ==========================================================================
           [UI & HUD 스타일 정의]
           ========================================================================== */
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; color: #0f0; user-select: none; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }
        
        .ui-container {
            position: absolute; top: 20px; left: 20px; width: 450px; max-height: 90vh; overflow-y: auto;
            background: rgba(0, 15, 0, 0.85); border: 2px solid rgba(0, 255, 0, 0.6); border-radius: 12px;
            padding: 25px; box-shadow: 0 0 25px rgba(0, 255, 0, 0.4), inset 0 0 20px rgba(0,255,0,0.15);
            z-index: 10; backdrop-filter: blur(10px);
        }
        .ui-container::-webkit-scrollbar { width: 6px; }
        .ui-container::-webkit-scrollbar-thumb { background: #0f0; border-radius: 3px; }
        
        h1, h2, h3 { text-align: center; margin-top: 0; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 12px #0f0; }
        h1 { border-bottom: 2px solid #0f0; padding-bottom: 12px; font-size: 1.8rem; }
        h2 { font-size: 1.2rem; color: #0fa; }
        
        input, button {
            width: 100%; padding: 14px; margin: 12px 0; box-sizing: border-box; background: rgba(0,20,0,0.9);
            color: #0f0; border: 1px solid #0f0; border-radius: 6px; font-family: inherit; font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus { outline: none; box-shadow: 0 0 15px #0f0; background: rgba(0, 60, 0, 0.9); transform: scale(1.02); }
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        button:hover { background: #0f0; color: #000; box-shadow: 0 0 20px #0f0; transform: translateY(-2px); }
        
        #app-section, #loading { display: none; }
        
        .log-box {
            border: 1px dashed rgba(0,255,0,0.7); padding: 18px; margin-top: 20px; min-height: 90px;
            background: rgba(0,0,0,0.7); border-radius: 8px; position: relative; font-size: 14px; line-height: 1.5;
        }
        .log-box::before {
            content: 'SECURE COMM LINK'; position: absolute; top: -12px; left: 15px; background: #000;
            padding: 0 8px; font-size: 12px; font-weight: bold; border: 1px solid #0f0; border-radius: 4px;
        }

        /* 교전 알람 점멸 효과 */
        @keyframes pulseAlert {
            0% { box-shadow: 0 0 20px rgba(255,0,0,0.5), inset 0 0 15px rgba(255,0,0,0.2); border-color: #f00; }
            50% { box-shadow: 0 0 40px rgba(255,0,0,0.8), inset 0 0 30px rgba(255,0,0,0.5); border-color: #ff3333; }
            100% { box-shadow: 0 0 20px rgba(255,0,0,0.5), inset 0 0 15px rgba(255,0,0,0.2); border-color: #f00; }
        }
        .alert-mode { animation: pulseAlert 1s infinite !important; color: #f00 !important; }
        .alert-mode h1, .alert-mode h2 { text-shadow: 0 0 15px #f00; border-color: #f00; color: #f00; }
        .alert-mode input, .alert-mode button { border-color: #f00; color: #f00; }
        .alert-mode button:hover { background: #f00; color: #fff; box-shadow: 0 0 20px #f00; }
        .alert-mode .log-box { border-color: #f00; background: rgba(50,0,0,0.8); }
        .alert-mode .log-box::before { border-color: #f00; color: #f00; }
        .warning-text { color: #fff; font-weight: bold; text-shadow: 0 0 10px #f00; font-size: 1.15em; }

        /* Tactical HUD Elements */
        #crosshair {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 50px; height: 50px; pointer-events: none; z-index: 4;
            border: 2px solid rgba(0,255,0,0.4); border-radius: 50%;
        }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(0,255,0,0.6); }
        #crosshair::before { top: 24px; left: -15px; width: 80px; height: 2px; }
        #crosshair::after { left: 24px; top: -15px; width: 2px; height: 80px; }

        .hud-panel { position: absolute; color: #0f0; font-weight: bold; pointer-events: none; z-index: 4; text-shadow: 0 0 5px #000; }
        #health-bar-container { top: 30px; right: 30px; width: 250px; height: 25px; border: 2px solid #0f0; background: rgba(0,0,0,0.5); }
        #health-bar { width: 100%; height: 100%; background: #0f0; transition: width 0.2s, background-color 0.2s; }
        
        #controls-hint { bottom: 30px; right: 30px; text-align: right; font-size: 15px; background: rgba(0,0,0,0.7); padding: 15px; border: 1px solid #0f0; border-radius: 8px; }
        .key { display: inline-block; padding: 4px 8px; border: 1px solid #0f0; border-radius: 4px; margin: 0 4px; color: #fff; font-weight: bold; }

        #damage-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle, transparent 30%, rgba(255,0,0,0.6) 90%, rgba(255,0,0,0.9) 100%); opacity: 0; pointer-events: none; z-index: 5; transition: opacity 0.1s; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="damage-overlay"></div>
    <div id="crosshair"></div>
    
    <div class="hud-panel" id="health-bar-container">
        <div id="health-bar"></div>
        <div style="text-align: center; font-size: 14px; margin-top: 8px;">HULL INTEGRITY</div>
    </div>

    <div class="hud-panel" id="controls-hint">
        <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 기동 (Maneuver)<br><br>
        <span class="key">SPACE</span> 무기 발사 (Fire)<br><br>
        <span class="key">F</span> 플레어 사출 (Flare)
    </div>

    <div class="ui-container" id="main-ui">
        <h1>✈️ C.I.C TACTICAL LINK</h1>
        
        <div id="auth-section">
            <h2>파일럿 생체 인증</h2>
            <input type="email" id="email" placeholder="CALLSIGN (Email)">
            <input type="password" id="password" placeholder="SECURITY CODE (Password)">
            <button id="btnLogin">접속 (LOGIN)</button>
            <button id="btnSignup" style="border-color: #0aa; color: #0aa; background: rgba(0,30,30,0.8);">신규 파일럿 등록</button>
        </div>

        <div id="app-section">
            <p id="user-info" style="text-align: center; color: #0ff; font-weight:bold;"></p>
            
            <button id="btnStartMission" style="background:rgba(80,0,0,0.9); border: 2px solid red; color:white; font-size: 16px;">
                ⚠️ 실전 교전 시뮬레이션 개시 (SPAWN ENEMIES)
            </button>
            
            <p id="loading" style="text-align:center; color:#ff0; font-weight:bold;">>>> 적성국 레이더 스파이크 탐지 중... <<<</p>
            
            <div class="log-box">
                <strong style="color: #0ff;">[AWACS E-3]:</strong>
                <p id="ai-response">스탠바이. 무기 시스템 온라인. 영공을 방어하십시오.</p>
            </div>
            
            <input type="text" id="user-action" placeholder="조종사 긴급 대처 행동 (예: 롤 배럴, 채프 사출)">
            <button id="btnSaveLog" style="background: rgba(0,50,0,0.9); border-color: #0f0;">기동 실행 및 블랙박스 동기화</button>
            <button id="btnLogout" style="border-color:#777; color:#777; background: rgba(20,20,20,0.8); margin-top: 25px;">임무 종료 (LOGOUT)</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ============================================================================
        // [SCENE & LIGHTING SETUP] - 주간 밝은 톤 유지
        // ============================================================================
        const container = document.getElementById('canvas-container');
        const overlay = document.getElementById('damage-overlay');
        const healthBar = document.getElementById('health-bar');
        const uiPanel = document.getElementById('main-ui');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a4b7c); 
        scene.fog = new THREE.FogExp2(0x4a7bad, 0.002); // 안개 옅게

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 8000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.2; bloomPass.strength = 0.8; bloomPass.radius = 0.5;
        composer.addPass(bloomPass);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 2.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff0dd, 4.0);
        dirLight.position.set(100, 200, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -200; dirLight.shadow.camera.right = 200;
        dirLight.shadow.camera.top = 200; dirLight.shadow.camera.bottom = -200;
        scene.add(dirLight);

        // ============================================================================
        // [PROCEDURAL TERRAIN] - 무한 산맥 지형 생성
        // ============================================================================
        const terrainGeo = new THREE.PlaneGeometry(3000, 3000, 150, 150);
        terrainGeo.rotateX(-Math.PI / 2);
        const posAttribute = terrainGeo.attributes.position;
        for (let i = 0; i < posAttribute.count; i++) {
            const x = posAttribute.getX(i);
            const z = posAttribute.getZ(i);
            let y = Math.sin(x * 0.005) * Math.cos(z * 0.005) * 120;
            y += Math.sin(x * 0.02) * Math.cos(z * 0.01) * 30;
            posAttribute.setY(i, y - 150); // 고도 설정
        }
        terrainGeo.computeVertexNormals();
        const terrainMat = new THREE.MeshStandardMaterial({ color: 0x3d5c3a, flatShading: true, roughness: 0.9 });
        const terrain = new THREE.Mesh(terrainGeo, terrainMat);
        terrain.receiveShadow = true;
        scene.add(terrain);

        // 그리드 헬퍼 (속도감 부여용)
        const grid = new THREE.GridHelper(3000, 100, 0x00ff88, 0x008844);
        grid.position.y = -50;
        scene.add(grid);

        // ============== [1부 끝] 2부 코드가 이 위치에 이어집니다 ============== //
        // ============================================================================
        // [GAME LOGIC & OBJECTS SETUP]
        // ============================================================================
        const gameObjects = { bullets: [], missiles: [], flares: [], enemies: [], particles: [] };
        const STATE = { isCombat: false, score: 0 };
        const INPUT = { w: false, a: false, s: false, d: false, space: false, f: false };

        window.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'w') INPUT.w = true;
            if(e.key.toLowerCase() === 'a') INPUT.a = true;
            if(e.key.toLowerCase() === 's') INPUT.s = true;
            if(e.key.toLowerCase() === 'd') INPUT.d = true;
            if(e.key === ' ') INPUT.space = true;
            if(e.key.toLowerCase() === 'f') { if(!INPUT.f) shootFlare(); INPUT.f = true; }
        });
        window.addEventListener('keyup', (e) => {
            if(e.key.toLowerCase() === 'w') INPUT.w = false;
            if(e.key.toLowerCase() === 'a') INPUT.a = false;
            if(e.key.toLowerCase() === 's') INPUT.s = false;
            if(e.key.toLowerCase() === 'd') INPUT.d = false;
            if(e.key === ' ') INPUT.space = false;
            if(e.key.toLowerCase() === 'f') INPUT.f = false;
        });

        // ============================================================================
        // [DETAILED STEALTH FIGHTER CLASS] - 고퀄리티 기체 복구
        // ============================================================================
        class Player {
            constructor() {
                this.mesh = new THREE.Group();
                this.mesh.position.set(0, 20, 0);
                this.health = 100;
                this.velocity = new THREE.Vector3(0, 0, -80); // 기본 전진 속도
                this.targetRotation = new THREE.Vector3();
                this.cooldown = 0;
                this.flames = [];
                this.buildDetailedModel();
                scene.add(this.mesh);
            }

            buildDetailedModel() {
                const hullMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.7, roughness: 0.3 });
                const detailMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.8, roughness: 0.4 });
                const glassMat = new THREE.MeshPhysicalMaterial({ color: 0x00ffcc, metalness: 0.9, roughness: 0.1, transmission: 0.9, transparent: true });

                // 동체
                const bodyGeo = new THREE.CylinderGeometry(0.8, 1.2, 8, 8);
                bodyGeo.rotateX(Math.PI / 2);
                const body = new THREE.Mesh(bodyGeo, hullMat);
                body.castShadow = true;

                // 기수 (코)
                const noseGeo = new THREE.ConeGeometry(0.8, 3.5, 8);
                noseGeo.rotateX(Math.PI / 2);
                const nose = new THREE.Mesh(noseGeo, hullMat);
                nose.position.z = 5.75;
                nose.castShadow = true;

                // 콕핏 (조종석)
                const cockpitGeo = new THREE.CapsuleGeometry(0.4, 2.5, 4, 8);
                cockpitGeo.rotateX(Math.PI / 2);
                const cockpit = new THREE.Mesh(cockpitGeo, glassMat);
                cockpit.position.set(0, 0.9, 2.5);

                // 날개
                const wingShape = new THREE.Shape();
                wingShape.moveTo(0, 0); wingShape.lineTo(6, -2.5); wingShape.lineTo(6, -4.5); wingShape.lineTo(0, -3.5);
                const wingExtrude = { depth: 0.15, bevelEnabled: true, bevelThickness: 0.05 };
                const wingGeo = new THREE.ExtrudeGeometry(wingShape, wingExtrude);
                
                const rightWing = new THREE.Mesh(wingGeo, hullMat);
                rightWing.rotation.x = Math.PI / 2; rightWing.position.set(0.5, 0, 1.5);
                rightWing.castShadow = true;

                const leftWing = new THREE.Mesh(wingGeo, hullMat);
                leftWing.rotation.x = Math.PI / 2; leftWing.scale.x = -1; leftWing.position.set(-0.5, 0, 1.5);
                leftWing.castShadow = true;

                // 꼬리 날개
                const tailShape = new THREE.Shape();
                tailShape.moveTo(0,0); tailShape.lineTo(1.5, -1); tailShape.lineTo(1.5, -2); tailShape.lineTo(0, -1);
                const tailGeo = new THREE.ExtrudeGeometry(tailShape, wingExtrude);
                
                const rTail = new THREE.Mesh(tailGeo, detailMat);
                rTail.position.set(0.5, 0.8, -3);
                rTail.rotation.x = Math.PI/2; rTail.rotation.y = Math.PI/2; rTail.rotation.x += 0.4;

                const lTail = new THREE.Mesh(tailGeo, detailMat);
                lTail.position.set(-0.5, 0.8, -3);
                lTail.rotation.x = Math.PI/2; lTail.rotation.y = Math.PI/2; lTail.rotation.x -= 0.4;
                lTail.scale.z = -1;

                this.mesh.add(body, nose, cockpit, rightWing, leftWing, rTail, lTail);

                // 엔진 추진 화염 파티클
                const flameGeo = new THREE.SphereGeometry(0.3, 8, 8);
                this.flameMat = new THREE.MeshBasicMaterial({ color: 0x00aaff, transparent: true, blending: THREE.AdditiveBlending });
                for(let i=0; i<30; i++) {
                    const p = new THREE.Mesh(flameGeo, this.flameMat);
                    p.userData = { offset: new THREE.Vector3((Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8, -4 - Math.random()*2), life: Math.random() };
                    this.mesh.add(p);
                    this.flames.push(p);
                }
            }

            update(dt) {
                // 키보드 조작 로직
                let moveSpeed = 60 * dt;
                let roll = 0; let pitch = 0;

                if(INPUT.w && this.mesh.position.y < 120) { this.mesh.position.y += moveSpeed; pitch = -0.3; }
                if(INPUT.s && this.mesh.position.y > 10) { this.mesh.position.y -= moveSpeed; pitch = 0.3; }
                if(INPUT.a && this.mesh.position.x > -150) { this.mesh.position.x -= moveSpeed; roll = 0.8; }
                if(INPUT.d && this.mesh.position.x < 150) { this.mesh.position.x += moveSpeed; roll = -0.8; }

                this.targetRotation.set(pitch, 0, roll);
                this.mesh.rotation.x = THREE.MathUtils.lerp(this.mesh.rotation.x, this.targetRotation.x, 0.1);
                this.mesh.rotation.z = THREE.MathUtils.lerp(this.mesh.rotation.z, this.targetRotation.z, 0.1);

                // 무기 발사
                if(INPUT.space && this.cooldown <= 0) {
                    shootBullet(this.mesh.position.clone());
                    this.cooldown = 0.15;
                }
                if(this.cooldown > 0) this.cooldown -= dt;

                // 엔진 화염 애니메이션
                this.flameMat.color.setHex(STATE.isCombat ? 0xff3300 : 0x00aaff); // 교전 시 붉은색
                this.flames.forEach(p => {
                    p.userData.life -= dt * 2;
                    if(p.userData.life <= 0) p.userData.life = 1;
                    p.position.copy(p.userData.offset).add(new THREE.Vector3(0,0, -p.userData.life * (STATE.isCombat ? 4 : 2)));
                    p.scale.setScalar(p.userData.life * (STATE.isCombat ? 2.0 : 1.0));
                    p.material.opacity = p.userData.life;
                });

                // 카메라 추적 (기체 뒤에서 자연스럽게 따라가기)
                camera.position.x = THREE.MathUtils.lerp(camera.position.x, this.mesh.position.x, 0.1);
                camera.position.y = THREE.MathUtils.lerp(camera.position.y, this.mesh.position.y + 8, 0.1);
                camera.position.z = this.mesh.position.z + 35;
                camera.lookAt(this.mesh.position.x, this.mesh.position.y, this.mesh.position.z - 50);

                // 지형 무한 스크롤 착시
                terrain.position.z = this.mesh.position.z - (this.mesh.position.z % 500);
                grid.position.z = this.mesh.position.z - (this.mesh.position.z % 100);
            }

            takeDamage(amount) {
                this.health -= amount;
                healthBar.style.width = Math.max(0, this.health) + "%";
                healthBar.style.backgroundColor = this.health < 30 ? "red" : (this.health < 60 ? "orange" : "#0f0");
                overlay.style.opacity = 1.0;
                setTimeout(() => overlay.style.opacity = 0, 150);
                if(this.health <= 0) {
                    createExplosion(this.mesh.position, 8, 0xffaa00);
                    alert("기체 파괴! 시뮬레이션이 초기화됩니다.");
                    resetGame();
                }
            }
        }
        const player = new Player();

        // ============================================================================
        // [WEAPONS & COMBAT SYSTEMS]
        // ============================================================================
        function shootBullet(pos) {
            const bGeo = new THREE.BoxGeometry(0.2, 0.2, 6);
            const bMat = new THREE.MeshBasicMaterial({color: 0xffff00});
            const b = new THREE.Mesh(bGeo, bMat);
            b.position.copy(pos); b.position.z -= 5;
            scene.add(b);
            gameObjects.bullets.push({ mesh: b, life: 2.0 });
        }

        function shootFlare() {
            const f = new THREE.Mesh(new THREE.SphereGeometry(0.6, 8, 8), new THREE.MeshBasicMaterial({color: 0xffaaaa}));
            f.position.copy(player.mesh.position);
            scene.add(f);
            gameObjects.flares.push({ mesh: f, life: 3.0, vel: new THREE.Vector3((Math.random()-0.5)*25, -10, player.velocity.z + 20) });
        }

        class Drone {
            constructor() {
                const droneGroup = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(3, 1, 3), new THREE.MeshStandardMaterial({color: 0x990000}));
                droneGroup.add(body);
                droneGroup.position.set((Math.random()-0.5)*200, 15 + Math.random()*60, player.mesh.position.z - 600 - Math.random()*300);
                
                this.mesh = droneGroup;
                this.health = 20;
                this.fireTimer = Math.random() * 2;
                scene.add(this.mesh);
            }
            update(dt, index) {
                this.mesh.position.z += 40 * dt; // 드론 이동 속도
                const dist = this.mesh.position.distanceTo(player.mesh.position);
                
                this.fireTimer -= dt;
                if(this.fireTimer <= 0 && dist < 500 && dist > 100 && this.mesh.position.z < player.mesh.position.z) {
                    shootEnemyMissile(this.mesh.position.clone());
                    this.fireTimer = 2.5 + Math.random() * 2;
                }
                if(this.mesh.position.z > player.mesh.position.z + 50) {
                    scene.remove(this.mesh); gameObjects.enemies.splice(index, 1);
                }
            }
        }

        function shootEnemyMissile(pos) {
            const mGeo = new THREE.CylinderGeometry(0.3, 0.3, 2.5, 8);
            mGeo.rotateX(Math.PI / 2);
            const m = new THREE.Mesh(mGeo, new THREE.MeshBasicMaterial({color: 0xff0000}));
            m.position.copy(pos);
            scene.add(m);
            gameObjects.missiles.push({ mesh: m, life: 6.0, speed: 140 });
        }

        function createExplosion(pos, size, colorHex) {
            const pGeo = new THREE.BoxGeometry(size, size, size);
            const pMat = new THREE.MeshBasicMaterial({color: colorHex, transparent: true});
            for(let i=0; i<10; i++) {
                const p = new THREE.Mesh(pGeo, pMat);
                p.position.copy(pos); scene.add(p);
                gameObjects.particles.push({ mesh: p, life: 1.0, vel: new THREE.Vector3((Math.random()-0.5)*40, (Math.random()-0.5)*40, (Math.random()-0.5)*40) });
            }
        }

        function resetGame() {
            STATE.isCombat = false;
            player.health = 100;
            healthBar.style.width = "100%"; healthBar.style.backgroundColor = "#0f0";
            uiPanel.classList.remove('alert-mode');
            
            gameObjects.enemies.forEach(e => scene.remove(e.mesh)); gameObjects.enemies = [];
            gameObjects.missiles.forEach(m => scene.remove(m.mesh)); gameObjects.missiles = [];
        }

        // ============== [2부 끝] 3부 코드가 이 위치에 이어집니다 ============== //
        // ============================================================================
        // [MAIN ANIMATION LOOP & PHYSICS] - 물리 엔진, 충돌 판정 및 렌더링
        // ============================================================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);

            // 1. 플레이어 업데이트
            player.mesh.position.z += player.velocity.z * dt;
            player.update(dt);

            // 2. 플레이어 총알 (Bullets) 로직 및 적 충돌
            for(let i = gameObjects.bullets.length - 1; i >= 0; i--) {
                let b = gameObjects.bullets[i];
                b.mesh.position.z -= 500 * dt; 
                b.life -= dt;
                if(b.life <= 0) { scene.remove(b.mesh); gameObjects.bullets.splice(i, 1); continue; }

                for(let j = gameObjects.enemies.length - 1; j >= 0; j--) {
                    let enemy = gameObjects.enemies[j];
                    if(b.mesh.position.distanceTo(enemy.mesh.position) < 5.0) {
                        createExplosion(enemy.mesh.position, 2.5, 0xff5500);
                        enemy.health -= 10;
                        scene.remove(b.mesh);
                        gameObjects.bullets.splice(i, 1);
                        
                        if(enemy.health <= 0) {
                            createExplosion(enemy.mesh.position, 12, 0xff0000);
                            scene.remove(enemy.mesh);
                            gameObjects.enemies.splice(j, 1);
                        }
                        break;
                    }
                }
            }

            // 3. 플레어 로직
            for(let i = gameObjects.flares.length - 1; i >= 0; i--) {
                let f = gameObjects.flares[i];
                f.mesh.position.addScaledVector(f.vel, dt);
                f.vel.y -= 15 * dt; // 중력
                f.life -= dt;
                f.mesh.scale.setScalar(Math.max(0.1, f.life));
                if(f.life <= 0) { scene.remove(f.mesh); gameObjects.flares.splice(i, 1); }
            }

            // 4. 적 미사일 (Homing) 로직 및 플레어 기만 판정
            for(let i = gameObjects.missiles.length - 1; i >= 0; i--) {
                let m = gameObjects.missiles[i];
                m.life -= dt;
                
                let targetPos = player.mesh.position.clone();
                let closestFlareDist = Infinity;
                gameObjects.flares.forEach(f => {
                    let d = m.mesh.position.distanceTo(f.mesh.position);
                    if(d < 200 && d < closestFlareDist) { 
                        targetPos = f.mesh.position.clone();
                        closestFlareDist = d;
                    }
                });

                m.mesh.lookAt(targetPos);
                const dir = new THREE.Vector3().subVectors(targetPos, m.mesh.position).normalize();
                m.mesh.position.addScaledVector(dir, m.speed * dt);

                if(Math.random() < 0.4) createExplosion(m.mesh.position, 0.8, 0xaaaaaa);

                // 플레이어 피격
                if(m.mesh.position.distanceTo(player.mesh.position) < 4.0) {
                    player.takeDamage(20);
                    createExplosion(m.mesh.position, 6, 0xff0000);
                    scene.remove(m.mesh); gameObjects.missiles.splice(i, 1); continue;
                }
                
                // 플레어에 유도되어 폭발
                if(closestFlareDist < 3.0) {
                    createExplosion(m.mesh.position, 5, 0xff8800);
                    scene.remove(m.mesh); gameObjects.missiles.splice(i, 1); continue;
                }

                if(m.life <= 0) { scene.remove(m.mesh); gameObjects.missiles.splice(i, 1); }
            }

            // 5. 파티클 로직
            for(let i = gameObjects.particles.length - 1; i >= 0; i--) {
                let p = gameObjects.particles[i];
                p.mesh.position.addScaledVector(p.vel, dt);
                p.life -= dt * 1.5;
                p.mesh.material.opacity = p.life;
                p.mesh.scale.setScalar(p.life);
                if(p.life <= 0) { scene.remove(p.mesh); gameObjects.particles.splice(i, 1); }
            }

            // 6. 적 드론 스폰 및 업데이트 (교전 상태 시)
            if(STATE.isCombat) {
                if(Math.random() < 0.015 && gameObjects.enemies.length < 6) {
                    gameObjects.enemies.push(new Drone());
                }
                for(let i = gameObjects.enemies.length - 1; i >= 0; i--) {
                    gameObjects.enemies[i].update(dt, i);
                }
            }

            composer.render();
        }
        
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================================================
        // [TTS ENGINE] - 음성 안내 기능 추가
        // ============================================================================
        function speakTacticalAudio(text) {
            // 진행 중인 모든 음성 취소 후 즉각 경고 출력
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ko-KR';
            utterance.rate = 1.25; // 약간 다급한 톤으로 속도 증가
            utterance.pitch = 0.6;  // 군 작전 느낌의 묵직한 베이스 톤
            window.speechSynthesis.speak(utterance);
        }

        // ============================================================================
        // [FIREBASE & AI 통신 시스템]
        // ============================================================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDg67w5ZvoLz4W1A1B7KciQ9fJSsiMlW7I", authDomain: "siuuuuuu-dcb76.firebaseapp.com",
            projectId: "siuuuuuu-dcb76", storageBucket: "siuuuuuu-dcb76.firebasestorage.app",
            messagingSenderId: "983718870215", appId: "1:983718870215:web:90e52ee1b1c5b9611312e2"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const aiResponseText = document.getElementById('ai-response');

        document.getElementById('btnSignup').addEventListener('click', () => {
            createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
            .then(() => alert("신규 파일럿 등록 완료."))
            .catch(e => alert("등록 오류: " + e.message));
        });

        document.getElementById('btnLogin').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
            .catch(e => alert("인증 실패: " + e.message));
        });

        document.getElementById('btnLogout').addEventListener('click', () => { 
            signOut(auth); resetGame(); 
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('app-section').style.display = 'block';
                document.getElementById('user-info').innerText = `현재 접속 중인 파일럿: ${user.email}`;
            } else {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('app-section').style.display = 'none';
            }
        });

        const GAS_URL = "https://script.google.com/macros/s/AKfycbyjKLDIXbIyVYmn_ieh2wwOl7GuCw7tpSGUCCArjYNmtjsj_Py0-ag5HdxfZhMXLHB6/exec";
        
        document.getElementById('btnStartMission').addEventListener('click', async () => {
            document.getElementById('loading').style.display = 'block';
            resetGame(); 
            uiPanel.classList.add('alert-mode'); 
            
            let messageText = "미확인 드론 스웜 접근 중! 즉각 교전하라!"; // 예비 스크립트 기본 문구
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 4000);
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ prompt: "적성국 드론 편대 출현을 경고하는 다급한 무전 1문장" }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                const data = await response.json();
                messageText = data.choices[0].message.content;
                aiResponseText.innerHTML = `<span class="warning-text">${messageText}</span>`;
            } catch (error) {
                aiResponseText.innerHTML = `<span class="warning-text">(통신 장애) ${messageText}</span>`;
            } finally {
                document.getElementById('loading').style.display = 'none';
                // 경고 전술 음성 가동 (TTS)
                speakTacticalAudio("경고. " + messageText);
                STATE.isCombat = true; 
            }
        });

        document.getElementById('btnSaveLog').addEventListener('click', async () => {
            const userAction = document.getElementById('user-action').value;
            if (!userAction) return alert("블랙박스에 기록할 조종사의 행동을 입력하십시오.");
            try {
                await addDoc(collection(db, "flight_logs"), {
                    pilot: auth.currentUser.email,
                    action: userAction,
                    timestamp: new Date()
                });
                alert("블랙박스 데이터 동기화 완료.");
                document.getElementById('user-action').value = "";
                
                resetGame(); 
                aiResponseText.innerHTML = "공역 클리어. 적대적 신호 소실. 순항 고도를 유지하십시오.";
                // 대처 완료 성공 음성 가동 (TTS)
                speakTacticalAudio("상황 돌파 성공. 기동 데이터를 완벽히 전송했습니다.");
            } catch (error) {
                alert("블랙박스 기록 실패: " + error.message);
            }
        });
    </script>
