<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D AI 전투기 시뮬레이터</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; color: #0f0; }
        
        /* 3D 캔버스 배경 */
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }
        
        /* 반투명 HUD 조종석 패널 */
        .ui-container { position: absolute; top: 20px; left: 20px; width: 400px; max-height: 90vh; overflow-y: auto; background: rgba(0, 20, 0, 0.7); border: 2px solid #0f0; border-radius: 10px; padding: 20px; box-shadow: 0 0 15px #0f0; z-index: 10; backdrop-filter: blur(5px); }
        
        h1, h2, h3 { text-align: center; margin-top: 0; text-shadow: 0 0 5px #0f0; }
        input, button { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; background: rgba(0,0,0,0.8); color: #0f0; border: 1px solid #0f0; font-family: inherit; transition: 0.3s; }
        button { cursor: pointer; font-weight: bold; }
        button:hover { background: #0f0; color: #000; }
        
        #app-section, #loading { display: none; }
        .api-box { border: 1px solid #f90; padding: 10px; margin-bottom: 15px; color: #f90; }
        .api-box input { border-color: #f90; color: #f90; }
        .log-box { border: 1px dashed #0f0; padding: 10px; margin-top: 10px; min-height: 60px; background: rgba(0,0,0,0.5); }
        .warning-text { color: #f33; font-weight: bold; text-shadow: 0 0 5px red; }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="ui-container">
    <h1>✈️ 3D 탑건 시뮬레이터</h1>

    <div class="api-box">
        <label>🔑 ChatGPT API Key (sk-로 시작):</label>
        <input type="password" id="openai-key" placeholder="sk-proj-...">
        <button id="btnSaveKey" style="color:#f90; border-color:#f90;">브라우저에 키 저장</button>
    </div>

    <div id="auth-section">
        <h2>파일럿 인증</h2>
        <input type="email" id="email" placeholder="이메일 입력 (예: pilot@test.com)">
        <input type="password" id="password" placeholder="비밀번호 (6자리 이상)">
        <button id="btnLogin">로그인</button>
        <button id="btnSignup">신규 등록</button>
    </div>

    <div id="app-section">
        <h2>📡 시스템 가동 중</h2>
        <p id="user-info" style="text-align: center; color: #aaa; margin: 5px 0;"></p>

        <button id="btnStartMission" style="background:#300; border-color:red; color:red; margin-top:15px;">⚠️ 실시간 위기 상황 생성 (ChatGPT)</button>
        <p id="loading" style="text-align:center; color:yellow;">ChatGPT가 전황을 연산 중입니다...</p>

        <div class="log-box">
            <strong>[관제탑 무전 통신]:</strong>
            <p id="ai-response">비행 상태 정상. 목표 지점으로 순항 중.</p>
        </div>

        <input type="text" id="user-action" placeholder="대처 행동 입력 (예: 회피 기동 및 플레어 사출)">
        <button id="btnSaveLog">상황 대처 완료 및 로그 저장</button>
        <button id="btnLogout" style="border-color:#555; color:#555;">로그아웃</button>
    </div>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
    // ----------------------------------------------------
    // [1] Three.js를 활용한 그래픽 엔진 구현
    // ----------------------------------------------------
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.02);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, -10); 
    camera.lookAt(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 라이팅 설정
    const ambientLight = new THREE.AmbientLight(0x404040, 2); 
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
    directionalLight.position.set(5, 10, -5);
    scene.add(directionalLight);
    
    // 경고 수치 발생 시 켜질 붉은색 경보등
    const alertLight = new THREE.PointLight(0xff0000, 0, 100);
    alertLight.position.set(0, 5, 0);
    scene.add(alertLight);

    // 도형을 결합한 3D 아군 전투기 조립
    const jetGroup = new THREE.Group();
    const jetMaterial = new THREE.MeshStandardMaterial({ color: 0x334455, metalness: 0.8, roughness: 0.2 });
    
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 4, 32), jetMaterial);
    body.rotation.x = Math.PI / 2;
    const nose = new THREE.Mesh(new THREE.ConeGeometry(0.5, 1.5, 32), jetMaterial);
    nose.position.z = 2.75;
    nose.rotation.x = Math.PI / 2;
    const wings = new THREE.Mesh(new THREE.BoxGeometry(6, 0.1, 1.5), jetMaterial);
    wings.position.set(0, 0, -0.5);
    const tail = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.5, 1), jetMaterial);
    tail.position.set(0, 0.75, -1.5);
    
    jetGroup.add(body, nose, wings, tail);
    scene.add(jetGroup);

    // 붉은색 3D 적기(위협 구체) 생성
    const threatMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.5 });
    const threat = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), threatMaterial);
    threat.position.set(0, 0, -50);
    threat.visible = false;
    scene.add(threat);

    // 우주 속도감을 표현할 1000개의 스타 파티클
    const particlesGeo = new THREE.BufferGeometry();
    const particlesCount = 1000;
    const posArray = new Float32Array(particlesCount * 3);
    for(let i = 0; i < particlesCount * 3; i++) {
        posArray[i] = (Math.random() - 0.5) * 100;
    }
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const particlesMat = new THREE.PointsMaterial({ size: 0.1, color: 0xaaaaaa });
    const particles = new THREE.Points(particlesGeo, particlesMat);
    scene.add(particles);

    let isAlert = false;

    // 프레임워크 애니메이션 루프
    function animate() {
        requestAnimationFrame(animate);
        
        particles.position.z -= 0.5;
        if(particles.position.z < -20) particles.position.z = 20;

        jetGroup.rotation.z = Math.sin(Date.now() * 0.001) * 0.1;
        jetGroup.position.y = Math.sin(Date.now() * 0.002) * 0.2;

        if (isAlert) {
            alertLight.intensity = (Math.sin(Date.now() * 0.01) + 1) * 20;
            if(threat.position.z < -5) threat.position.z += 0.25; 
            // 긴박한 카메라 쉐이킹 연출
            camera.position.x = (Math.random() - 0.5) * 0.4;
            camera.position.y = 3 + (Math.random() - 0.5) * 0.4;
        } else {
            alertLight.intensity = 0;
            camera.position.x = 0;
        }

        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ----------------------------------------------------
    // [2] Firebase 및 ChatGPT AI 백엔드 연동
    // ----------------------------------------------------
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDg67w5ZvoLz4W1A1B7KciQ9fJSsiMlW7I",
        authDomain: "siuuuuuu-dcb76.firebaseapp.com",
        projectId: "siuuuuuu-dcb76",
        storageBucket: "siuuuuuu-dcb76.firebasestorage.app",
        messagingSenderId: "983718870215",
        appId: "1:983718870215:web:90e52ee1b1c5b9611312e2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const aiResponseText = document.getElementById('ai-response');
    let currentScenario = "";

    const keyInput = document.getElementById('openai-key');
    if(localStorage.getItem('saved_openai_key')) keyInput.value = localStorage.getItem('saved_openai_key');
    document.getElementById('btnSaveKey').addEventListener('click', () => {
        localStorage.setItem('saved_openai_key', keyInput.value);
        alert("ChatGPT API 키가 저장되었습니다.");
    });

    // Firebase 이메일 가입 및 로그인 기능
    document.getElementById('btnSignup').addEventListener('click', () => {
        createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
            .then(() => alert("등록 완료! 등록한 계정으로 로그인하세요."))
            .catch(e => alert(e.message));
    });
    document.getElementById('btnLogin').addEventListener('click', () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
            .catch(e => alert("로그인 실패: " + e.message));
    });
    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            document.getElementById('user-info').innerText = `접속 코드네임: ${user.email}`;
        } else {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('app-section').style.display = 'none';
            resolveAlert();
        }
    });

    // 🔊 TTS (Text-to-Speech) 기능
    function speakText(text) {
        window.speechSynthesis.cancel(); // 이전 소리 초기화로 중첩 방지
        const u = new SpeechSynthesisUtterance("긴급 상황 발생. " + text);
        u.lang = 'ko-KR'; 
        u.rate = 1.25; // 약간 빠르고 긴장감 넘치는 배속
        u.pitch = 0.55; // 군대 무전 시스템 같은 묵직한 기계음 톤
        window.speechSynthesis.speak(u);
    }

    function triggerAlert(message) {
        isAlert = true;
        threat.visible = true;
        threat.position.set((Math.random()-0.5)*8, (Math.random()-0.5)*5, -55); 
        aiResponseText.innerText = message;
        aiResponseText.classList.add('warning-text');
        speakText(message); // 🔊 생성과 동시에 TTS 송출 활성화
    }

    function resolveAlert() {
        isAlert = false;
        threat.visible = false;
        aiResponseText.innerText = "비행 상태 정상. 목표 지점으로 순항 중.";
        aiResponseText.classList.remove('warning-text');
        document.getElementById('user-action').value = "";
    }

    // 🌐 ChatGPT (OpenAI) API 호출 로직으로 변경 완료
    document.getElementById('btnStartMission').addEventListener('click', async () => {
        const apiKey = localStorage.getItem('saved_openai_key') || keyInput.value;
        if (!apiKey) return alert("ChatGPT API 키를 상단에 먼저 입력해 주세요!");

        document.getElementById('loading').style.display = 'block';
        resolveAlert();

        const promptText = "너는 전투기 관제탑 시스템이야. 조종사에게 발생하는 극도로 위험한 상황(예: 미사일 록온, 엔진 화재, 미확인 기체 급습 등)을 전투기 영화 대사처럼 다급하고 짧게 딱 '1문장'으로 경고해줘.";

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}` // ChatGPT 인증 방식
                },
                body: JSON.stringify({
                    model: "gpt-4o-mini", // 빠르고 가벼운 모델 사용
                    messages: [{ role: "user", content: promptText }]
                })
            });
            const data = await response.json();
            
            if(data.error) throw new Error(data.error.message);
            
            // ChatGPT 응답 파싱
            currentScenario = data.choices[0].message.content;
            triggerAlert(currentScenario);
            
        } catch (error) {
            aiResponseText.innerText = "통신 장애: " + error.message;
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    });

    // Firebase Firestore DB 로그 저장
    document.getElementById('btnSaveLog').addEventListener('click', async () => {
        const userAction = document.getElementById('user-action').value;
        if (!isAlert || !userAction) return alert("상황이 없거나 조종사 대처 행동이 공백입니다.");

        try {
            await addDoc(collection(db, "flight_logs"), {
                pilot: auth.currentUser.email,
                scenario: currentScenario,
                action: userAction,
                timestamp: new Date()
            });
            alert("대처 성공 로그가 'siuuuuuu' 데이터베이스 서버에 기록되었습니다!");
            resolveAlert(); 
        } catch (error) {
            alert("서버 전송 실패: " + error.message);
        }
    });
</script>
</body>
</html>
