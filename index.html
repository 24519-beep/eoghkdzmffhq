<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 전투기 비행 아카데미</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #121212; color: #00ff00; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; border: 2px solid #00ff00; padding: 20px; border-radius: 10px; }
        h1, h2, h3 { text-align: center; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; background: black; color: #00ff00; border: 1px solid #00ff00; }
        button { cursor: pointer; font-weight: bold; }
        button:hover { background: #00ff00; color: black; }
        #app-section, #loading { display: none; }
        .log-box { border: 1px dashed #00ff00; padding: 15px; margin-top: 15px; min-height: 100px; background: #0a0a0a; }
        .api-box { border: 1px solid #ff9900; padding: 10px; margin-bottom: 20px; border-radius: 5px; color: #ff9900; }
        .api-box input { color: #ff9900; border: 1px solid #ff9900; }
    </style>
</head>
<body>

<div class="container">
    <h1>✈️ 탑건: AI 비행 시뮬레이터</h1>

    <div class="api-box">
        <label>🔑 ChatGPT API Key 설정 (최초 1회 입력):</label>
        <input type="password" id="openai-key" placeholder="sk-proj-...로 시작하는 키를 입력하세요">
        <button id="btnSaveKey" style="color: #ff9900; border-color: #ff9900;">API 키 브라우저에 저장</button>
    </div>

    <div id="auth-section">
        <h2>파일럿 로그인</h2>
        <input type="email" id="email" placeholder="이메일 입력 (예: pilot@topgun.com)">
        <input type="password" id="password" placeholder="비밀번호 입력 (6자리 이상)">
        <button id="btnLogin">로그인</button>
        <button id="btnSignup">신규 파일럿 등록</button>
    </div>

    <div id="app-section">
        <h2>📡 관제탑 통신망 접속됨</h2>
        <p id="user-info"></p>
        <button id="btnLogout">로그아웃</button>

        <hr>

        <h3>▶️ 훈련 미션</h3>
        <button id="btnStartMission">새로운 위기 상황 발생시키기 (ChatGPT AI)</button>
        <p id="loading">AI 교관이 시나리오를 생성 중입니다...</p>

        <div class="log-box">
            <strong>[AI 관제탑 통신]:</strong>
            <p id="ai-response">대기 중...</p>
        </div>

        <input type="text" id="user-action" placeholder="당신의 대처를 입력하세요 (예: 플레어 사출 후 회피 기동)">
        <button id="btnSaveLog">상황 및 대처 결과 보고 (Firebase DB 저장)</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 💡 제공해주신 siuuuuuu 프로젝트의 Firebase 설정이 정상 적용되었습니다.
    const firebaseConfig = {
        apiKey: "AIzaSyDg67w5ZvoLz4W1A1B7KciQ9fJSsiMlW7I",
        authDomain: "siuuuuuu-dcb76.firebaseapp.com",
        projectId: "siuuuuuu-dcb76",
        storageBucket: "siuuuuuu-dcb76.firebasestorage.app",
        messagingSenderId: "983718870215",
        appId: "1:983718870215:web:90e52ee1b1c5b9611312e2",
        measurementId: "G-SBNP2QLBG2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // UI 요소 선택
    const authSection = document.getElementById('auth-section');
    const appSection = document.getElementById('app-section');
    const aiResponseText = document.getElementById('ai-response');
    let currentScenario = "";

    // API 키 관리 (로컬 스토리지 이용해 GitHub 소스코드 유출 차단)
    const keyInput = document.getElementById('openai-key');
    if(localStorage.getItem('saved_openai_key')) {
        keyInput.value = localStorage.getItem('saved_openai_key');
    }
    document.getElementById('btnSaveKey').addEventListener('click', () => {
        localStorage.setItem('saved_openai_key', keyInput.value);
        alert("API 키가 안전하게 브라우저에 저장되었습니다! GitHub에 유출되지 않습니다.");
    });

    // ----------------------------------------------------
    // [1] Firebase Authentication (로그인/회원가입)
    // ----------------------------------------------------
    document.getElementById('btnSignup').addEventListener('click', () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        createUserWithEmailAndPassword(auth, email, password)
            .then(() => alert("파일럿 등록 완료!"))
            .catch(error => alert("오류: " + error.message));
    });

    document.getElementById('btnLogin').addEventListener('click', () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        signInWithEmailAndPassword(auth, email, password)
            .catch(error => alert("로그인 실패: " + error.message));
    });

    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
        if (user) {
            authSection.style.display = 'none';
            appSection.style.display = 'block';
            document.getElementById('user-info').innerText = `접속 조종사: ${user.email}`;
        } else {
            authSection.style.display = 'block';
            appSection.style.display = 'none';
        }
    });

    // ----------------------------------------------------
    // [2] TTS (Text-to-Speech) 기능
    // ----------------------------------------------------
    function speakText(text) {
        window.speechSynthesis.cancel(); 
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ko-KR';
        utterance.rate = 1.1; 
        utterance.pitch = 0.8; 
        window.speechSynthesis.speak(utterance);
    }

    // ----------------------------------------------------
    // [3] 생성형 AI API (ChatGPT - gpt-4o-mini 모델 사용) 연동
    // ----------------------------------------------------
    document.getElementById('btnStartMission').addEventListener('click', async () => {
        const apiKey = localStorage.getItem('saved_openai_key') || keyInput.value;
        if (!apiKey) {
            alert("상단의 ChatGPT API 키를 먼저 설정해주세요!");
            return;
        }

        const loading = document.getElementById('loading');
        loading.style.display = 'block';
        aiResponseText.innerText = "관제탑 통신 연결 중...";

        const prompt = "너는 전투기 훈련 교관이야. 조종사에게 발생하는 위급한 비행 상황(예: 엔진 고장, 적기 출현, 기상 악화 등)을 아주 짧고 긴박하게 딱 '1문장'으로만 말해줘. 군대 말투나 존댓말을 써줘.";
        
        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "gpt-4o-mini", // 가장 빠르고 가성비 좋은 모델
                    messages: [{ role: "user", content: prompt }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error.message);
            }

            currentScenario = data.choices[0].message.content;
            aiResponseText.innerText = currentScenario;
            speakText(currentScenario); // TTS 음성 출력
        } catch (error) {
            aiResponseText.innerText = "통신 장애 발생: " + error.message;
        } finally {
            loading.style.display = 'none';
        }
    });

    // ----------------------------------------------------
    // [4] Firebase Firestore DB 연동 (데이터 저장)
    // ----------------------------------------------------
    document.getElementById('btnSaveLog').addEventListener('click', async () => {
        const userAction = document.getElementById('user-action').value;
        if (!currentScenario || !userAction) {
            alert("상황이 발생하지 않았거나 대처를 입력하지 않았습니다.");
            return;
        }

        try {
            await addDoc(collection(db, "flight_logs"), {
                pilot: auth.currentUser.email,
                scenario: currentScenario,
                action: userAction,
                timestamp: new Date()
            });
            alert("비행 일지가 'siuuuuuu' 서버에 성공적으로 기록되었습니다!");
            document.getElementById('user-action').value = ""; 
        } catch (error) {
            alert("기록 실패: " + error.message);
        }
    });
</script>

</body>
</html>
