<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D AI 전투기 시뮬레이터 - 주간 작전 모드</title>
    <style>
        /* ==========================================================================
           [UI & HUD 스타일 정의] - 기존 기능 유지
           ========================================================================== */
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; color: #0f0; user-select: none; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }
        
        .ui-container {
            position: absolute; top: 20px; left: 20px; width: 450px; max-height: 90vh; overflow-y: auto;
            background: rgba(0, 15, 0, 0.85); border: 2px solid rgba(0, 255, 0, 0.6); border-radius: 12px;
            padding: 25px; box-shadow: 0 0 25px rgba(0, 255, 0, 0.4), inset 0 0 20px rgba(0,255,0,0.15);
            z-index: 10; backdrop-filter: blur(10px);
        }
        .ui-container::-webkit-scrollbar { width: 6px; }
        .ui-container::-webkit-scrollbar-thumb { background: #0f0; border-radius: 3px; }
        
        h1, h2, h3 { text-align: center; margin-top: 0; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 12px #0f0; }
        h1 { border-bottom: 2px solid #0f0; padding-bottom: 12px; font-size: 1.8rem; }
        h2 { font-size: 1.2rem; color: #0fa; }
        
        input, button {
            width: 100%; padding: 14px; margin: 12px 0; box-sizing: border-box; background: rgba(0,20,0,0.9);
            color: #0f0; border: 1px solid #0f0; border-radius: 6px; font-family: inherit; font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus { outline: none; box-shadow: 0 0 15px #0f0; background: rgba(0, 60, 0, 0.9); transform: scale(1.02); }
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        button:hover { background: #0f0; color: #000; box-shadow: 0 0 20px #0f0; transform: translateY(-2px); }
        button:active { transform: translateY(1px); }
        
        #app-section, #loading { display: none; }
        
        .log-box {
            border: 1px dashed rgba(0,255,0,0.7); padding: 18px; margin-top: 20px; min-height: 90px;
            background: rgba(0,0,0,0.7); border-radius: 8px; position: relative;
        }
        .log-box::before {
            content: 'SECURE COMM LINK'; position: absolute; top: -12px; left: 15px; background: #000;
            padding: 0 8px; font-size: 12px; font-weight: bold; border: 1px solid #0f0; border-radius: 4px;
        }
        
        /* 알람 모드 점멸 효과 */
        @keyframes pulseAlert {
            0% { box-shadow: 0 0 20px rgba(255,0,0,0.5), inset 0 0 15px rgba(255,0,0,0.2); border-color: #f00; }
            50% { box-shadow: 0 0 40px rgba(255,0,0,0.8), inset 0 0 30px rgba(255,0,0,0.5); border-color: #ff3333; }
            100% { box-shadow: 0 0 20px rgba(255,0,0,0.5), inset 0 0 15px rgba(255,0,0,0.2); border-color: #f00; }
        }
        .alert-mode { animation: pulseAlert 1s infinite !important; color: #f00 !important; }
        .alert-mode h1, .alert-mode h2 { text-shadow: 0 0 15px #f00; border-color: #f00; color: #f00; }
        .alert-mode input, .alert-mode button { border-color: #f00; color: #f00; }
        .alert-mode button:hover { background: #f00; color: #fff; box-shadow: 0 0 20px #f00; }
        .alert-mode .log-box { border-color: #f00; background: rgba(50,0,0,0.8); }
        .alert-mode .log-box::before { border-color: #f00; color: #f00; }
        
        .warning-text { color: #fff; font-weight: bold; text-shadow: 0 0 10px #f00; font-size: 1.15em; line-height: 1.5; }
        
        #damage-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, transparent 30%, rgba(255,0,0,0.6) 90%, rgba(255,0,0,0.9) 100%);
            opacity: 0; pointer-events: none; z-index: 5; transition: opacity 0.1s;
        }

        #crosshair {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 50px; height: 50px; pointer-events: none; z-index: 4;
            border: 2px solid rgba(0,255,0,0.3); border-radius: 50%;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(0,255,0,0.5);
        }
        #crosshair::before { top: 24px; left: -10px; width: 70px; height: 2px; }
        #crosshair::after { left: 24px; top: -10px; width: 2px; height: 70px; }
        
        .hud-side { position: absolute; top: 50%; transform: translateY(-50%); color: rgba(0,255,0,0.7); font-weight: bold; pointer-events: none; z-index: 4; text-shadow: 1px 1px 2px #000; }
        #altimeter { right: 50px; text-align: right; border-right: 3px solid rgba(0,255,0,0.5); padding-right: 10px; }
        #speedometer { left: 50px; border-left: 3px solid rgba(0,255,0,0.5); padding-left: 10px; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="damage-overlay"></div>
    <div id="crosshair"></div>
    <div class="hud-side" id="altimeter">ALT<br>35000<br>FT</div>
    <div class="hud-side" id="speedometer">SPD<br>MACH 1.8</div>

    <div class="ui-container" id="main-ui">
        <h1>✈️ 3D TOPGUN C.I.C (V2.0)</h1>
        
        <div id="auth-section">
            <h2>파일럿 생체 인증</h2>
            <input type="email" id="email" placeholder="CALLSIGN (Email)">
            <input type="password" id="password" placeholder="SECURITY CODE (Password)">
            <button id="btnLogin">접속 (LOGIN)</button>
            <button id="btnSignup" style="border-color: #0aa; color: #0aa; background: rgba(0,30,30,0.8);">신규 파일럿 등록</button>
        </div>

        <div id="app-section">
            <h2>📡 통합 전술 데이터 링크</h2>
            <p id="user-info" style="text-align: center; color: #0ff; margin: 5px 0; font-size: 13px; font-weight:bold;"></p>
            
            <button id="btnStartMission" style="background:rgba(80,0,0,0.9); border: 2px solid red; color:white; margin-top:20px; font-size: 16px; text-shadow: 0 0 8px red;">
                ⚠️ 즉각 위기 상황 시뮬레이션
            </button>
            
            <p id="loading" style="text-align:center; color:#ff0; font-weight:bold; animation: blink 0.5s infinite alternate;">>>> 적성국 레이더 스파이크 탐지 중... <<<</p>
            
            <div class="log-box">
                <strong style="color: #0f0; font-size:1.1em;">[AWACS E-3 센트리]:</strong>
                <p id="ai-response">시스템 스탠바이. 영공 진입 확인. 초계 비행을 계속하라.</p>
            </div>
            
            <input type="text" id="user-action" placeholder="조종사 긴급 대처 행동 (예: 롤 배럴, 채프 사출)">
            <button id="btnSaveLog" style="background: rgba(0,50,0,0.9); border-color: #0f0;">기동 실행 및 블랙박스 동기화</button>
            <button id="btnLogout" style="border-color:#777; color:#777; background: rgba(20,20,20,0.8); margin-top: 25px;">임무 종료 (LOGOUT)</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        // ============================================================================
        // [0] CONFIGURATION & UTILS (밝기 조정됨)
        // ============================================================================
        const CONFIG = {
            GAS_URL: "https://script.google.com/macros/s/AKfycbyjKLDIXbIyVYmn_ieh2wwOl7GuCw7tpSGUCCArjYNmtjsj_Py0-ag5HdxfZhMXLHB6/exec",
            SCENE: { 
                clearColor: 0x2a4b7c, // 밝은 배경색 (파란 하늘 느낌)
                fogColor: 0x4a7bad,   // 안개색도 밝게 조정
                fogDensity: 0.008     // 안개 밀도를 낮춰서 시야를 넓게 확보
            },
            JET: { speed: 1.0, alertSpeed: 4.5, boostColor: 0xff3300, normalColor: 0x00aaff },
            PARTICLES: { maxStars: 4000, maxClouds: 50 }
        };

        const FALLBACK_SCENARIOS = [
            "적 스텔스기 2기 6시 방향 접근! 즉각 회피기동하라!",
            "SAM 지대공 미사일 록온 경고! 고도를 낮추고 플레어를 사출해!",
            "우측 엔진에 피격 발생! 소화 시스템 가동하고 자세를 유지해!",
            "다수의 적 드론 스웜 탐지! 전속력으로 해당 공역을 이탈하라!"
        ];

        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        const container = document.getElementById('canvas-container');
        const overlay = document.getElementById('damage-overlay');
        const uiContainer = document.getElementById('main-ui');
        const crosshair = document.getElementById('crosshair');

        // ============================================================================
        // [1] SCENE & LIGHTING SETUP (조명 대폭 강화)
        // ============================================================================
        const scene = new THREE.Scene();
        // 배경색을 명시적으로 밝게 지정
        scene.background = new THREE.Color(CONFIG.SCENE.clearColor);
        scene.fog = new THREE.FogExp2(CONFIG.SCENE.fogColor, CONFIG.SCENE.fogDensity);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 5, -18);
        camera.lookAt(0, 0, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3; // 전체 노출(밝기) 증가
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.2;
        bloomPass.strength = 0.8;
        bloomPass.radius = 0.5;
        composer.addPass(bloomPass);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; 

        // 조명 밝기 대폭 상향
        const ambientLight = new THREE.AmbientLight(0xffffff, 2.5); // 완전히 밝은 흰색 빛으로 기체 전체를 밝힘
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xfff0dd, 4.0); // 태양광 느낌의 직사광선 강도 증가
        dirLight.position.set(30, 60, -30);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 50;
        dirLight.shadow.camera.bottom = -50;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        const alertLight = new THREE.PointLight(0xff0000, 0, 150);
        alertLight.position.set(0, 8, 0);
        scene.add(alertLight);

        // ==========================================
        // [2] DETAILED STEALTH FIGHTER ASSEMBLY
        // ==========================================
        const jetGroup = new THREE.Group();
        
        // 기체 재질도 빛을 더 잘 받도록 수정 (색상 톤을 조금 높임)
        const hullMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.7, roughness: 0.3 });
        const detailMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.8, roughness: 0.4 });
        const glassMat = new THREE.MeshPhysicalMaterial({ 
            color: 0x00ffcc, metalness: 0.9, roughness: 0.1, transmission: 0.9, transparent: true 
        });

        const bodyGeo = new THREE.CylinderGeometry(0.8, 1.2, 8, 8);
        bodyGeo.rotateX(Math.PI / 2);
        const body = new THREE.Mesh(bodyGeo, hullMat);
        body.castShadow = true;

        const noseGeo = new THREE.ConeGeometry(0.8, 3.5, 8);
        noseGeo.rotateX(Math.PI / 2);
        const nose = new THREE.Mesh(noseGeo, hullMat);
        nose.position.z = 5.75;
        nose.castShadow = true;

        const cockpitGeo = new THREE.CapsuleGeometry(0.4, 2.5, 4, 8);
        cockpitGeo.rotateX(Math.PI / 2);
        const cockpit = new THREE.Mesh(cockpitGeo, glassMat);
        cockpit.position.set(0, 0.9, 2.5);

        const wingShape = new THREE.Shape();
        wingShape.moveTo(0, 0); wingShape.lineTo(6, -2.5); wingShape.lineTo(6, -4.5); wingShape.lineTo(0, -3.5);
        const wingExtrude = { depth: 0.15, bevelEnabled: true, bevelThickness: 0.05 };
        const wingGeo = new THREE.ExtrudeGeometry(wingShape, wingExtrude);
        
        const rightWing = new THREE.Mesh(wingGeo, hullMat);
        rightWing.rotation.x = Math.PI / 2; rightWing.position.set(0.5, 0, 1.5);
        rightWing.castShadow = true;

        const leftWing = new THREE.Mesh(wingGeo, hullMat);
        leftWing.rotation.x = Math.PI / 2; leftWing.scale.x = -1; leftWing.position.set(-0.5, 0, 1.5);
        leftWing.castShadow = true;

        const tailShape = new THREE.Shape();
        tailShape.moveTo(0,0); tailShape.lineTo(1.5, -1); tailShape.lineTo(1.5, -2); tailShape.lineTo(0, -1);
        const tailGeo = new THREE.ExtrudeGeometry(tailShape, wingExtrude);
        
        const rTail = new THREE.Mesh(tailGeo, detailMat);
        rTail.position.set(0.5, 0.8, -3);
        rTail.rotation.x = Math.PI/2; rTail.rotation.y = Math.PI/2; rTail.rotation.x += 0.4;

        const lTail = new THREE.Mesh(tailGeo, detailMat);
        lTail.position.set(-0.5, 0.8, -3);
        lTail.rotation.x = Math.PI/2; lTail.rotation.y = Math.PI/2; lTail.rotation.x -= 0.4;
        lTail.scale.z = -1;

        jetGroup.add(body, nose, cockpit, rightWing, leftWing, rTail, lTail);
        scene.add(jetGroup);

        const flames = [];
        const flameGeo = new THREE.SphereGeometry(0.3, 8, 8);
        const flameMat = new THREE.MeshBasicMaterial({ color: CONFIG.JET.normalColor, transparent: true, blending: THREE.AdditiveBlending });
        for(let i=0; i<40; i++) {
            const p = new THREE.Mesh(flameGeo, flameMat);
            p.userData = { offset: new THREE.Vector3((Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8, -4 - Math.random()*2), life: Math.random() };
            jetGroup.add(p);
            flames.push(p);
        }

        // ==========================================
        // [3] PROCEDURAL ENVIRONMENT (밝은 테마로 변경)
        // ==========================================
        // 바닥 그리드 선을 더 밝고 눈에 띄게 변경 (밝은 녹색 톤)
        const grid = new THREE.GridHelper(1000, 200, 0x00ff88, 0x008844);
        grid.position.y = -30;
        scene.add(grid);

        const dustGeo = new THREE.BufferGeometry();
        const dustPos = new Float32Array(CONFIG.PARTICLES.maxStars * 3);
        for(let i=0; i<CONFIG.PARTICLES.maxStars*3; i++) {
            dustPos[i] = (Math.random() - 0.5) * 400;
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
        // 파티클(구름/대기 먼지) 색상을 밝은 환경에 맞춰 눈에 띄게 수정
        const dustMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.6, transparent: true, opacity: 0.5 });
        const dust = new THREE.Points(dustGeo, dustMat);
        scene.add(dust);

        // ==========================================
        // [4] COMBAT SYSTEMS (무기 & 적 AI)
        // ==========================================
        const missiles = [];
        const flares = [];
        let isAlert = false;

        function spawnFlare() {
            const f = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffddaa }));
            f.position.copy(jetGroup.position);
            f.position.z -= 4;
            f.userData = { vx: (Math.random()-0.5)*1.5, vy: -0.5 - Math.random(), vz: -1.0, life: 1.0 };
            scene.add(f);
            flares.push(f);
        }

        function spawnEnemyMissile() {
            const mGeo = new THREE.CylinderGeometry(0.15, 0.15, 3, 8);
            mGeo.rotateX(Math.PI/2);
            const mMat = new THREE.MeshStandardMaterial({ color: 0xaa0000, emissive: 0xff0000, emissiveIntensity: 0.5 });
            const m = new THREE.Mesh(mGeo, mMat);
            m.position.set((Math.random()-0.5)*80, (Math.random()-0.5)*40, -400);
            
            const mFlame = new THREE.PointLight(0xff5500, 2, 20);
            mFlame.position.z = -1.5;
            m.add(mFlame);

            scene.add(m);
            missiles.push(m);
        }

        // ==========================================
        // [5] MAIN ANIMATION LOOP
        // ==========================================
        const clock = new THREE.Clock();
        let targetRoll = 0, targetPitch = 0, shake = 0;

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            
            let currentSpeed = isAlert ? CONFIG.JET.alertSpeed : CONFIG.JET.speed;

            grid.position.z += currentSpeed * 2;
            if (grid.position.z > 50) grid.position.z = 0;

            const dPos = dust.geometry.attributes.position;
            for(let i=0; i<CONFIG.PARTICLES.maxStars; i++) {
                let z = dPos.getZ(i) + currentSpeed * 5;
                if(z > 100) { z = -300; dPos.setX(i, (Math.random()-0.5)*400); dPos.setY(i, (Math.random()-0.5)*400); }
                dPos.setZ(i, z);
            }
            dPos.needsUpdate = true;

            flameMat.color.setHex(isAlert ? CONFIG.JET.boostColor : CONFIG.JET.normalColor);
            flames.forEach(p => {
                p.userData.life -= 0.05;
                if(p.userData.life <= 0) p.userData.life = 1;
                p.position.copy(p.userData.offset).add(new THREE.Vector3(0,0, -p.userData.life * (isAlert ? 4 : 2)));
                p.scale.setScalar(p.userData.life * (isAlert ? 2.0 : 1.0));
                p.material.opacity = p.userData.life;
            });

            if (isAlert) {
                if (Math.random() < 0.04) targetRoll = (Math.random() - 0.5) * Math.PI * 3; 
                if (Math.random() < 0.06) targetPitch = (Math.random() - 0.5) * Math.PI * 0.8;
                if (Math.random() < 0.15) spawnFlare();
                if (Math.random() < 0.08) spawnEnemyMissile();

                alertLight.intensity = (Math.sin(time * 20) + 1) * 80;
                bloomPass.strength = 1.2 + Math.sin(time * 25) * 0.4;
                shake = 0.8;
                overlay.style.opacity = Math.abs(Math.sin(time * 12)) * 0.7;
                crosshair.style.borderColor = "rgba(255,0,0,0.8)";
            } else {
                targetRoll = Math.sin(time * 1.2) * 0.3;
                targetPitch = Math.sin(time * 0.7) * 0.15;
                alertLight.intensity = 0;
                bloomPass.strength = 0.8;
                shake = 0.05;
                overlay.style.opacity = 0;
                crosshair.style.borderColor = "rgba(0,255,0,0.3)";
            }

            jetGroup.rotation.z = THREE.MathUtils.lerp(jetGroup.rotation.z, targetRoll, 0.04);
            jetGroup.rotation.x = THREE.MathUtils.lerp(jetGroup.rotation.x, targetPitch, 0.04);
            jetGroup.position.y = Math.sin(time * 2.5) * 0.8;

            for(let i = missiles.length - 1; i >= 0; i--) {
                let m = missiles[i];
                m.position.z += currentSpeed * 4;
                m.position.x = THREE.MathUtils.lerp(m.position.x, jetGroup.position.x, 0.03);
                m.position.y = THREE.MathUtils.lerp(m.position.y, jetGroup.position.y, 0.03);
                m.lookAt(jetGroup.position);
                if(m.position.z > 30) { scene.remove(m); missiles.splice(i, 1); }
            }

            for(let i = flares.length - 1; i >= 0; i--) {
                let f = flares[i];
                f.position.x += f.userData.vx; f.position.y += f.userData.vy; f.position.z += f.userData.vz;
                f.userData.life -= 0.03; f.scale.setScalar(f.userData.life * 2);
                if(f.userData.life <= 0) { scene.remove(f); flares.splice(i, 1); }
            }

            camera.position.x = (Math.random() - 0.5) * shake;
            camera.position.y = 5 + (Math.random() - 0.5) * shake;

            controls.update();
            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================================================
        // [6] FIREBASE & BUSINESS LOGIC & AI (기능 100% 동일)
        // ============================================================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDg67w5ZvoLz4W1A1B7KciQ9fJSsiMlW7I", authDomain: "siuuuuuu-dcb76.firebaseapp.com",
            projectId: "siuuuuuu-dcb76", storageBucket: "siuuuuuu-dcb76.firebasestorage.app",
            messagingSenderId: "983718870215", appId: "1:983718870215:web:90e52ee1b1c5b9611312e2"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const aiResponseText = document.getElementById('ai-response');
        const uiPanel = document.getElementById('main-ui');
        let currentScenario = "";

        document.getElementById('btnSignup').addEventListener('click', () => {
            createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
            .then(() => alert("파일럿 등록 완료. 기밀 인가 대기 중..."))
            .catch(e => alert("보안 프로토콜 거부: " + e.message));
        });

        document.getElementById('btnLogin').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
            .catch(e => alert("인증 실패: " + e.message));
        });

        document.getElementById('btnLogout').addEventListener('click', () => {
            signOut(auth).then(() => { alert("임무 완료. RTB(Return to Base)."); resolveAlert(); });
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('app-section').style.display = 'block';
                document.getElementById('user-info').innerText = `접속된 호출부호: ${user.email.split('@')[0].toUpperCase()}`;
            } else {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('app-section').style.display = 'none';
                resolveAlert();
            }
        });

        function speakText(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance("경고. " + text);
            u.lang = 'ko-KR'; u.rate = 1.3; u.pitch = 0.5;
            window.speechSynthesis.speak(u);
        }

        function triggerAlert(message) {
            isAlert = true;
            uiPanel.classList.add('alert-mode');
            aiResponseText.innerHTML = `<span class="warning-text">${message}</span>`;
            speakText(message);
        }

        function resolveAlert() {
            isAlert = false;
            uiPanel.classList.remove('alert-mode');
            missiles.forEach(m => scene.remove(m)); missiles.length = 0;
            targetRoll = 0; targetPitch = 0;
            aiResponseText.innerHTML = "위협 해제 확인. 현재 공역 클리어. 순항 고도 유지 중.";
            document.getElementById('user-action').value = "";
        }

        document.getElementById('btnStartMission').addEventListener('click', async () => {
            document.getElementById('loading').style.display = 'block';
            resolveAlert();
            const promptText = "너는 전투기 관제탑이야. 조종사에게 발생하는 위험상황을 탑건 대사처럼 1문장으로 경고해줘.";
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);

                const response = await fetch(CONFIG.GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ prompt: promptText }),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                currentScenario = data.choices[0].message.content;
                triggerAlert(currentScenario);
                
            } catch (error) {
                console.warn("GAS 통신 실패, 내부 AI 백업 시스템 가동:", error.message);
                const randomBackupScenario = FALLBACK_SCENARIOS[Math.floor(Math.random() * FALLBACK_SCENARIOS.length)];
                currentScenario = `(백업 통신망) ${randomBackupScenario}`;
                triggerAlert(currentScenario);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        });

        document.getElementById('btnSaveLog').addEventListener('click', async () => {
            const userAction = document.getElementById('user-action').value;
            if (!isAlert) return alert("현재 교전 상황이 아닙니다.");
            if (!userAction) return alert("긴급 대처 기동을 입력해야 생존할 수 있습니다!");
            
            try {
                await addDoc(collection(db, "flight_logs"), {
                    pilot: auth.currentUser.email,
                    scenario: currentScenario,
                    action: userAction,
                    timestamp: new Date(),
                    status: "SURVIVED"
                });
                alert(`기동 기록 완료: [${userAction}]`);
                speakText("완벽한 기동이었다. 위협 무효화 성공.");
                resolveAlert();
            } catch (error) {
                alert("블랙박스 서버 연결 실패: " + error.message);
            }
        });
    </script>
</body>
</html>
